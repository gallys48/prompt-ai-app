name: Backend CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: prompt_ai_test_db
          POSTGRES_USER: prompt_ai_test_user
          POSTGRES_PASSWORD: prompt_ai_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U prompt_ai_test_user -d prompt_ai_test_db"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      APP_ENV: test
      LOG_LEVEL: WARNING

      POSTGRES_DB: prompt_ai_test_db
      POSTGRES_USER: prompt_ai_test_user
      POSTGRES_PASSWORD: prompt_ai_test_password
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432

      API_V1_PREFIX: /api/v1
      PROJECT_NAME: Prompt AI App Test

      SECRET_KEY: test_secret_key_for_ci
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_DAYS: 30

      CELERY_BROKER_URL: memory://
      CELERY_RESULT_BACKEND: rpc://

      GIGACHAT_AUTH_KEY: test
      GIGACHAT_SCOPE: GIGACHAT_API_PERS
      GIGACHAT_MODEL: GigaChat
      GIGACHAT_VERIFY_SSL: "false"
      GIGACHAT_CA_BUNDLE: ""
      GIGACHAT_TIMEOUT_SECONDS: 10

      FIRST_ADMIN_FULL_NAME: Администратор
      FIRST_ADMIN_USERNAME: admin
      FIRST_ADMIN_EMAIL: admin@example.com
      FIRST_ADMIN_PASSWORD: admin12345
      FIRST_ADMIN_ORG: Администрация

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        working-directory: backend
        run: |
          pytest -q