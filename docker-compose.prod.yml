services:
  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2

  celery_worker:
    command: celery -A app.worker.celery_app:celery_app worker --loglevel=info --concurrency=2

  frontend:
    build:
      context: ./frontend
      target: runner
      args:
        NEXT_PUBLIC_API_BASE_URL: /api/v1
    environment:
      NEXT_PUBLIC_API_BASE_URL: /api/v1

  nginx:
    ports:
      - "80:80"