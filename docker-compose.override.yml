services:
  postgres:
    ports:
      - "${POSTGRES_HOST_PORT}:5432"

  rabbitmq:
    ports:
      - "5672:5672"
      - "15672:15672"

  backend:
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/logs:/app/logs
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    volumes:
      - ./backend:/app
      - ./backend/logs:/app/logs
    command: celery -A app.worker.celery_app:celery_app worker --loglevel=info

  frontend:
    build:
      context: ./frontend
      target: dev
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: /api/v1
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0"
    depends_on:
      - backend

  nginx:
    ports:
      - "80:80"

volumes:
  frontend_node_modules: