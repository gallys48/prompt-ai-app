services:
  postgres:
    image: postgres:17
    container_name: prompt_ai_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: prompt_ai_rabbitmq
    restart: unless-stopped
    env_file:
      - .env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: prompt_ai_backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./backend/logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  celery_worker:
    build:
      context: ./backend
    container_name: prompt_ai_celery_worker
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./backend/logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: celery -A app.worker.celery_app:celery_app worker --loglevel=info

  frontend:
    build:
      context: ./frontend
      target: runner
      args:
        NEXT_PUBLIC_API_BASE_URL: /api/v1
    container_name: prompt_ai_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: /api/v1
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: prompt_ai_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

  postgres_test:
    image: postgres:17
    container_name: prompt_ai_postgres_test
    restart: unless-stopped
    profiles:
      - test
    environment:
      POSTGRES_DB: prompt_ai_test_db
      POSTGRES_USER: prompt_ai_test_user
      POSTGRES_PASSWORD: prompt_ai_test_password
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prompt_ai_test_user -d prompt_ai_test_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend_tests:
    build:
      context: ./backend
    container_name: prompt_ai_backend_tests
    profiles:
      - test
    env_file:
      - .env.test
    working_dir: /app
    environment:
      PYTHONPATH: /app
    volumes:
      - ./backend:/app
      - ./backend/logs:/app/logs
    depends_on:
      postgres_test:
        condition: service_healthy
    command: pytest -q

volumes:
  postgres_data:
  rabbitmq_data:
  postgres_test_data: