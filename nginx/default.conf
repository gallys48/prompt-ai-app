upstream frontend_upstream {
    server frontend:3000;
}

upstream backend_upstream {
    server backend:8000;
}

server {
    listen 443 ssl;
    server_name prompts.digistroy.ru;

    ssl_certificate /etc/letsencrypt/live/prompts.digistroy.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/prompts.digistroy.ru/privkey.pem;

    client_max_body_size 20m;

    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    location = /api/v1 {
        proxy_pass http://backend_upstream/api/v1;
    }

    location /api/v1/ {
        proxy_pass http://backend_upstream/api/v1/;
    }

    location = /docs {
        proxy_pass http://backend_upstream/docs;
    }

    location /docs/ {
        proxy_pass http://backend_upstream/docs/;
    }

    location = /redoc {
        proxy_pass http://backend_upstream/redoc;
    }

    location = /openapi.json {
        proxy_pass http://backend_upstream/openapi.json;
    }

    location / {
        proxy_pass http://frontend_upstream;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}